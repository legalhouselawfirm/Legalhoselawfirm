<style>
  body { margin: 0; font-variant-numeric: lining-nums; font-feature-settings: 'lnum' 1; }
  section[id], footer[id] { scroll-margin-top: 145px; }
  .lh-mobile-toggle { display: none; }
  .lh-top-bar-text { display: inline; }

  @media (max-width: 900px) {
    .lh-desktop-nav { display: none !important; }
    .lh-mobile-toggle { display: flex !important; }
    .lh-top-bar-text { display: none; }
    .lh-top-bar-label { display: inline !important; }
    .lh-logo { height: 54px !important; max-width: 210px !important; }
    .lh-hero-section { padding-top: 150px !important; padding-bottom: 48px !important; min-height: 0 !important; }
    .lh-hero-grid { grid-template-columns: 1fr !important; gap: 28px !important; min-height: 0 !important; }
    .lh-hero-image { display: block !important; order: -1; }
    .lh-hero-image img { height: 260px !important; }
    .lh-hero-h1 { font-size: 36px !important; }
    .lh-hero-h2 { font-size: 26px !important; margin-bottom: 20px !important; }
    .lh-stats-grid { gap: 16px !important; }
    .lh-stats-grid > div > div:first-child { font-size: 32px !important; }
    .lh-stats-grid > div > div:last-child { font-size: 14px !important; }
    .lh-team-grid { gap: 32px !important; margin-top: 32px !important; }
    .lh-team-grid > div { margin-top: 0 !important; }
    .lh-footer-contact-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .lh-internship-grid { grid-template-columns: 1fr !important; }
    .lh-practice-sidebar { display: none !important; }
    .lh-footer-bottom { justify-content: center !important; text-align: center !important; }
    .lh-section-h2 { font-size: 28px !important; }
    .lh-expertise-layout { flex-direction: column !important; }
    .lh-expertise-photo { width: 100% !important; max-width: 320px; }
  }

  html, body { overflow-x: hidden; }
  @media (max-width: 600px) {
    #insights, #testimonials, #location > div:first-child { padding-top: 56px !important; padding-bottom: 56px !important; }
    .lh-testimonial-row { gap: 10px !important; }
    .lh-testimonial-arrow { width: 40px !important; height: 40px !important; flex-shrink: 0; }
    .lh-testimonial-quote p { font-size: 18px !important; line-height: 1.5 !important; }
    .lh-footer-soc { width: 46px !important; height: 46px !important; }
    .lh-section-h2 { font-size: 26px !important; }
  }

  .lh-linkedin-badge { animation: lhFloat 3s ease-in-out infinite; transition: transform 0.25s ease, box-shadow 0.25s ease; }
  .lh-linkedin-badge:hover { transform: translateY(-6px) scale(1.12) !important; box-shadow: 0 8px 18px rgba(0,0,0,0.35) !important; animation-play-state: paused; }
  @keyframes lhFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

  .lh-testimonial-arrow:hover { background: rgba(254,206,0,0.15) !important; border-color: var(--gold-500) !important; }

  .lh-chat-fab { transition: transform 0.25s ease, box-shadow 0.25s ease; }
  .lh-chat-fab:hover { transform: translateY(-3px) scale(1.06); box-shadow: 0 16px 40px rgba(0,0,0,0.4), inset 0 0 0 2px var(--gold-500) !important; }
  @media (prefers-reduced-motion: no-preference) {
    .lh-chat-fab-pulse::after { content: ''; position: absolute; inset: -2px; border-radius: 50%; border: 2px solid var(--gold-500); animation: lhChatPulse 2.4s ease-out infinite; pointer-events: none; }
    .lh-chat-dot { animation: lhChatBlink 1.6s ease-in-out infinite; }
    .lh-chat-nudge { animation: lhChatNudgeIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .lh-chat-window { animation: lhChatNudgeIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both; transform-origin: bottom right; }
  }
  @keyframes lhChatPulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.55); opacity: 0; } }
  @keyframes lhChatBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  @keyframes lhChatNudgeIn { from { opacity: 0; transform: translateY(14px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .lh-nav-link::after { content: ''; position: absolute; left: 0; right: 100%; bottom: 0; height: 2px; background: linear-gradient(90deg, var(--gold-600), var(--gold-500)); transition: right 0.3s ease; }
  .lh-nav-link:hover::after, .lh-nav-active::after { right: 0; }
  .lh-nav-link { transition: color 0.25s ease; }
  .lh-nav-link:hover, .lh-nav-active { color: var(--gold-600) !important; }

  .lh-reel-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
  .lh-reel-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg, 0 14px 34px rgba(0,0,0,0.14)) !important; }
  .lh-reel-thumb .lh-reel-play { transition: transform 0.3s ease, background 0.25s ease; }
  .lh-reel-card:hover .lh-reel-play { transform: scale(1.12); background: #fff !important; }
  .lh-insights-cta { transition: transform 0.25s ease, box-shadow 0.25s ease; }
  .lh-insights-cta:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg, 0 12px 28px rgba(0,0,0,0.18)) !important; }
  .lh-footer-soc { transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease; }
  .lh-footer-soc:hover { transform: translateY(-3px); background: rgba(254,206,0,0.14) !important; border-color: var(--gold-500) !important; }

  .lh-expertise-row { transition: background 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease; }
  .lh-expertise-row:hover { background: var(--neutral-50); box-shadow: var(--shadow-md); border-color: var(--gold-600) !important; }
  .lh-engage-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
  .lh-engage-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-xl); }
  .lh-expertise-row:hover { background: var(--neutral-50); }
  .lh-expertise-summary { max-height: 0; opacity: 0; overflow: hidden; margin-top: 0; transition: max-height 0.35s ease, opacity 0.3s ease, margin-top 0.3s ease; }
  .lh-expertise-row:hover .lh-expertise-summary, .lh-expertise-row:focus-visible .lh-expertise-summary { max-height: 90px; opacity: 1; margin-top: 10px; }

  @media (prefers-reduced-motion: no-preference) {
    .lh-reveal { opacity: 0; transform: translateY(18px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .lh-reveal.lh-reveal-in { opacity: 1; transform: translateY(0); }
    .lh-testimonial-quote { animation: lhQuoteIn 0.6s ease; }
  }
  @keyframes lhQuoteIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 900px) {
    .lh-engage-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 900px) {
    .lh-insights-grid { grid-template-columns: repeat(2, 1fr) !important; max-width: 560px !important; }
    .lh-footer-social-label { display: none !important; }
  }
  @media (max-width: 560px) {
    .lh-insights-grid { grid-template-columns: 1fr !important; max-width: 300px !important; }
  }
  body.lh-mood-ivory .lh-hero-flip,
  body.lh-mood-ivory .lh-hero-flip-muted { color: var(--ink-950) !important; }
  body.lh-mood-ivory .lh-hero-flip-muted { opacity: 0.65; }

  .lh-hero-pattern { transition: opacity 0.6s ease; }
  body.lh-motion-on .lh-hero-pattern { animation: lhDrift 40s linear infinite; }
  @keyframes lhDrift { from { background-position: 0 0; } to { background-position: 300px 300px; } }
  body.lh-motion-on .lh-stat { animation: lhRise 0.8s ease both; }
  body.lh-motion-on .lh-stat:nth-child(1) { animation-delay: 0.05s; }
  body.lh-motion-on .lh-stat:nth-child(2) { animation-delay: 0.2s; }
  body.lh-motion-on .lh-stat:nth-child(3) { animation-delay: 0.35s; }
  @keyframes lhRise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
